<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스타크래프트 스타일 디펜스</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-wrapper">
        <div id="game-container">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            
            <div id="ui-panel">
                <div id="stats" class="panel-section">
                    <p class="stat-line">자원: <span id="money">100</span> M</p>
                    <p class="stat-line">기지 체력: <span id="lives">20</span></p>
                    <p class="stat-line">웨이브: <span id="wave">1</span></p>
                    <p class="stat-line">점수: <span id="score">0</span></p>
                </div>
                
                <div id="build-menu" class="panel-section">
                    <h3>유닛 생산 (Build)</h3>
                    <div class="tower-btn" data-type="marine" data-cost="20">
                        <div class="icon marine-icon"></div>
                        <div class="tower-info">
                            <span class="t-name">마린 ($20)</span>
                            <span class="t-desc">빠른 연사, 기본 유닛</span>
                        </div>
                    </div>
                    <div class="tower-btn" data-type="firebat" data-cost="35">
                        <div class="icon firebat-icon"></div>
                        <div class="tower-info">
                            <span class="t-name">파이어뱃 ($35)</span>
                            <span class="t-desc">스플래시 근거리 공격</span>
                        </div>
                    </div>
                    <div class="tower-btn" data-type="ghost" data-cost="45">
                        <div class="icon ghost-icon"></div>
                        <div class="tower-info">
                            <span class="t-name">고스트 ($45)</span>
                            <span class="t-desc">원거리 저격, 단일 데미지</span>
                        </div>
                    </div>
                    <div class="tower-btn" data-type="tank" data-cost="90">
                        <div class="icon tank-icon"></div>
                        <div class="tower-info">
                            <span class="t-name">시즈탱크 ($90)</span>
                            <span class="t-desc">장거리 넓은 스플래시</span>
                        </div>
                    </div>
                    <div class="tower-btn" data-type="turret" data-cost="40">
                        <div class="icon turret-icon"></div>
                        <div class="tower-info">
                            <span class="t-name">미사일 터렛 ($40)</span>
                            <span class="t-desc">공중 유닛 전용 최강</span>
                        </div>
                    </div>
                </div>

                <div id="controls" class="panel-section">
                    <button id="start-wave-btn">명령 대기중... (Next Wave)</button>
                </div>
                
                <div id="message-box">
                    <p id="msg-text">환영합니다 사령관님. 적들의 침공이 예상됩니다. 방어선을 구축하십시오!</p>
                </div>
            </div>
        </div>
        
        <div id="game-over" class="hidden">
            <h1>MISSION FAILED</h1>
            <p>기지가 파괴되었습니다...</p>
            <button id="restart-btn">다시 시작 (Restart)</button>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
